<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="1" />
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#09090B" stop-opacity="0" />
    </radialGradient>
    
    <!-- Sparkle Gradient -->
    <linearGradient id="sparkle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAFAFA" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>

  <!-- Glowing Orb -->
  <circle cx="16" cy="16" r="14" fill="url(#glow)" />

  <!-- Main Sparkle -->
  <path d="M16,6 L18.2,12.8 L25,15 L18.2,17.2 L16,24 L13.8,17.2 L7,15 L13.8,12.8 Z" fill="url(#sparkle-grad)" />
  
  <!-- Mini Sparkle 1 -->
  <path d="M8,7 L8.7,8.8 L10.5,9.2 L8.7,9.6 L8,11.4 L7.3,9.6 L5.5,9.2 L7.3,8.8 Z" fill="#FAFAFA" opacity="0.9" />

  <!-- Mini Sparkle 2 -->
  <path d="M24,21 L24.7,22.8 L26.5,23.2 L24.7,23.6 L24,25.4 L23.3,23.6 L21.5,23.2 L23.3,22.8 Z" fill="#FAFAFA" opacity="0.9" />
</svg>
